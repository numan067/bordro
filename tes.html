<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görüşler ve Mesajlar</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        
        .header-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .header-card h1 { margin: 0; font-size: 18px; font-weight: 800; }
        
        .back-btn { display: inline-block; margin-bottom: 10px; text-decoration: none; color: #64748b; font-size: 14px; font-weight: 600; }
        
        .card { background: white; border-radius: 18px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; margin-bottom: 15px; overflow: hidden; }
        h3 { font-size: 15px; color: #1e293b; margin: 10px; display: flex; align-items: center; gap: 8px; }
        
        iframe { width: 100%; border: none; }
        /* Form yüksekliği */
        .form-frame { height: 480px; }
        /* Mesaj listesi yüksekliği */
        .list-frame { height: 450px; border-top: 1px solid #f1f5f9; }

        .footer-note { text-align: center; font-size: 10px; color: #94a3b8; margin-top: 10px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
    
    <div class="header-card">
        <h1>Görüş ve Öneriler</h1>
    </div>

    <div class="card">
        <h3>✍️ Yeni Mesaj Yaz</h3>
        <iframe class="form-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScRhNnQJDqN_2oW9grq-_xDKVL0soNwNy1voCP3jBX6pnngiQ/viewform?embedded=true">Yükleniyor…</iframe>
    </div>

    <div class="card">
        <h3>💬 Gönderilen Mesajlar</h3>
        <iframe class="list-frame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTuR56Y8EAEjFCFGJKdXq0KAg6SQIz-ZJhSzRnnRmVwamtdzWlRV9ALbUGXMW7CaKAUchwUhTVWLWUI/pubhtml?gid=1694101446&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
    </div>

    <div class="footer-note">
        Yeni mesajlar listede birkaç dakika içinde görünür.
    </div>
</div>

</body>
</html>
