<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görüş ve Öneriler</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        
        /* Üst Başlık Kartı */
        .header-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .header-card h1 { margin: 0; font-size: 18px; font-weight: 800; }
        
        /* Geri Dön Butonu */
        .back-btn { display: inline-block; margin-bottom: 10px; text-decoration: none; color: #64748b; font-size: 14px; font-weight: 600; }
        
        /* Mesaj Alanı Kartı */
        .card { background: white; border-radius: 18px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; min-height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
    
    <div class="header-card">
        <h1>Görüş ve Öneriler</h1>
    </div>

    <div class="card">
        <script src="https://utteranc.es/client.js"
                repo="numan067/bordro" 
                issue-term="pathname"
                label="ziyaretçi-mesajı"
                theme="github-light"
                crossorigin="anonymous"
                async>
        </script>
    </div>
</div>

</body>
</html>
