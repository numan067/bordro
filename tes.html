<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görüş ve Öneriler</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { color: #2c3e50; margin-top: 0; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; resize: none; font-family: inherit; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Görüş ve Öneri</h2>
    <p style="font-size: 13px; color: #666; text-align: center;">Fikirleriniz benim için değerli. Lütfen aşağıya yazın.</p>
    
    <form action="#">
        <textarea placeholder="Mesajınızı buraya yazın..."></textarea>
        <button type="button" class="btn-submit" onclick="alert('Teşekkürler! Öneriniz kaydedildi. (Simüle edildi)')">Gönder</button>
    </form>
    
    <a href="index.html" class="btn-back">← Ana Sayfaya Dön</a>
</div>

</body>
</html>
