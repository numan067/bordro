<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Maaş Hesaplama</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; padding: 15px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 20px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #6a1b9a; padding-bottom: 10px; font-size: 20px; }
        
        /* Seçenekler Alanı */
        .top-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .option-group { flex: 1; display: flex; flex-direction: column; }
        .option-group label { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        .option-group select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background-color: #fff; cursor: pointer; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 4px; font-weight: 600; color: #555; font-size: 11.5px; }
        .input-group input { padding: 9px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background-color: #fafafa; }
        
        .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .output-group { background: #f9f9f9; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .output-label { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; }
        .output-value { font-size: 14px; font-weight: bold; color: #2c3e50; }
        
        .net-maas-box { background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%); color: #fff; padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .net-maas-label { font-size: 14px; margin-bottom: 4px; opacity: 0.9; }
        .net-maas-value { font-size: 30px; font-weight: 800; }
        
        .bottom-buttons { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .bottom-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-default { background-color: #ecf0f1; color: #34495e; }
        @media (max-width: 500px) { .input-grid, .output-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Maaş Hesaplama 2026</h2>
        
        <div class="top-options">
            <div class="option-group">
                <label>Dönem (Ay)</label>
                <select id="month" onchange="hesapla()">
                    <option value="1">Ocak</option><option value="2" selected>Şubat</option><option value="3">Mart</option>
                    <option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option>
                    <option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option>
                    <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
                </select>
            </div>
            <div class="option-group">
                <label>Vergi Dilimi</label>
                <select id="tax-rate" onchange="hesapla()">
                    <option value="0.15">%15</option>
                    <option value="0.20">%20</option>
                    <option value="0.27">%27</option>
                    <option value="0.35">%35</option>
                </select>
            </div>
        </div>
        
        <div class="input-grid">
            <div class="input-group"><label>Saat Ücreti:</label><input type="number" id="saat-ucreti" step="0.01" value="380.71" oninput="hesapla()"></div>
            <div class="input-group"><label>Çalışma Gün Saati:</label><input type="number" id="calisma-gun-saati" value="210" oninput="hesapla()"></div>
            <div class="input-group"><label>Fazla Mesai (Saat):</label><input type="number" id="fazla-mesai-saati" value="16" oninput="hesapla()"></div>
            <div class="input-group"><label>Gece Zammı (Saat):</label><input type="number" id="gece-zammi" value="60" oninput="hesapla()"></div>
            <div class="input-group"><label>Net BES (TL):</label><input type="number" id="bes-kesintisi" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Vakıf Kesintisi (%):</label><input type="number" id="vakif-yuzde" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Bayram Mesaisi (Saat):</label><input type="number" id="bayram-saati" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Yol Ücreti (Brüt):</label><input type="number" id="yol-ucreti" value="0" oninput="hesapla()"></div>
        </div>

        <div class="output-grid">
            <div class="output-group"><div class="output-label">Toplam Brüt</div><div id="toplam-brut" class="output-value">0,00</div></div>
            <div class="output-group"><div class="output-label">Sendika Kesinti</div><div id="sendika-kesinti" class="output-value">0,00</div></div>
            <div class="output-group"><div class="output-label">Vakıf Tutar</div><div id="vakif-tutar" class="output-value">0,00</div></div>
            <div class="output-group"><div class="output-label">Vergi İstisnası</div><div id="vergi-istisnasi" class="output-value">0,00</div></div>
        </div>

        <div class="net-maas-box">
            <div class="net-maas-label">Ödenecek Net Maaş</div>
            <div class="net-maas-value" id="net-maas">0,00 TL</div>
        </div>

        <div class="bottom-buttons">
            <button class="btn-default" onclick="location.href='index.html'">Ana Sayfa</button>
            <button class="btn-default" onclick="location.href='sosyal.html'">Sosyal Haklar</button>
        </div>
    </div>

    <script>
        const ayVerileri = {
            1: { gv: 4211.33, dv: 250.70 }, 2: { gv: 4211.33, dv: 250.70 },
            3: { gv: 4211.33, dv: 250.70 }, 4: { gv: 4211.33, dv: 250.70 },
            5: { gv: 4211.33, dv: 250.70 }, 6: { gv: 4211.33, dv: 250.70 },
            7: { gv: 4537.75, dv: 250.70 }, 8: { gv: 5615.10, dv: 250.70 },
            9: { gv: 5615.10, dv: 250.70 }, 10: { gv: 5615.10, dv: 250.70 },
            11: { gv: 5615.10, dv: 250.70 }, 12: { gv: 5615.10, dv: 250.70 }
        };

        function hesapla() {
            const saatUcreti = parseFloat(document.getElementById('saat-ucreti').value) || 0;
            const gunSaati = parseFloat(document.getElementById('calisma-gun-saati').value) || 0;
            const fm = parseFloat(document.getElementById('fazla-mesai-saati').value) || 0;
            const gece = parseFloat(document.getElementById('gece-zammi').value) || 0;
            const bayram = parseFloat(document.getElementById('bayram-saati').value) || 0;
            const yol = parseFloat(document.getElementById('yol-ucreti').value) || 0;
            const besNet = parseFloat(document.getElementById('bes-kesintisi').value) || 0;
            const vakifYuzde = parseFloat(document.getElementById('vakif-yuzde').value) || 0;
            const vergiOrani = parseFloat(document.getElementById('tax-rate').value);
            const secilenAy = document.getElementById('month').value;
            
            const istisnaGV = ayVerileri[secilenAy].gv;
            const istisnaDV = ayVerileri[secilenAy].dv;

            // Brüt: Gece zammı bordrodaki gibi 22.81 TL
            let brut = (saatUcreti * gunSaati) + (fm * saatUcreti * 2) + (gece * 22.81) + 
                       (bayram * saatUcreti * 2) + yol;

            const sgk = brut * 0.14;
            const issizlik = brut * 0.01;
            const sendika = saatUcreti * 7.00; // Bordro uyumlu (7 saat)
            const vakifTutar = brut * (vakifYuzde / 100);
            
            const vergiMatrahi = brut - sgk - issizlik - sendika;
            let gelirVergisi = (vergiMatrahi * vergiOrani) - istisnaGV;
            if (gelirVergisi < 0) gelirVergisi = 0;

            const damgaVergisi = (brut * 0.00759) - istisnaDV;
            const dvNet = damgaVergisi < 0 ? 0 : damgaVergisi;

            const netMaas = brut - sgk - issizlik - gelirVergisi - dvNet - sendika - vakifTutar - besNet;

            const f = (n) => n.toLocaleString('tr-TR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            document.getElementById('toplam-brut').innerText = f(brut);
            document.getElementById('sendika-kesinti').innerText = f(sendika);
            document.getElementById('vakif-tutar').innerText = f(vakifTutar);
            document.getElementById('vergi-istisnasi').innerText = f(istisnaGV + istisnaDV);
            document.getElementById('net-maas').innerText = f(netMaas) + " TL";
        }
        
        window.onload = hesapla;
    </script>
</body>
</html>
