<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bordro Portalı 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        
        h2 { text-align: center; color: #6a1b9a; border-bottom: 2px solid #6a1b9a; padding-bottom: 10px; margin-bottom: 20px; font-size: 20px; }
        
        .section-title { font-weight: bold; color: #4a148c; background: #f3e5f5; padding: 8px; border-radius: 5px; margin: 15px 0 10px 0; font-size: 13px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #555; margin-bottom: 4px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Hesaplama Sonuç Paneli */
        .result-panel { background: #6a1b9a; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .res-label { font-size: 13px; opacity: 0.9; }
        .res-value { font-size: 28px; font-weight: 800; margin-top: 5px; }

        /* Butonlar */
        .nav-buttons { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { display: block; text-align: center; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-social { background-color: #8e24aa; color: white; }
        .btn-fark { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        
        .footer { text-align: center; margin-top: 20px; font-size: 10px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>2026 MAAŞ HESAPLAMA</h2>

    <div class="grid">
        <div class="input-group">
            <label>Saat Ücreti (Brüt):</label>
            <input type="number" id="saat-ucreti" placeholder="0.00" oninput="hesapla()">
        </div>
        <div class="input-group">
            <label>Vergi Dilimi:</label>
            <select id="vergi-dilimi" onchange="hesapla()">
                <option value="0.15">%15</option>
                <option value="0.20">%20</option>
                <option value="0.27">%27</option>
            </select>
        </div>
    </div>

    <div class="section-title">Mesai ve Saatler</div>
    <div class="input-group">
        <label>Normal Çalışma (Saat):</label>
        <input type="number" id="norm-saat" value="225" oninput="hesapla()">
    </div>
    <div class="grid">
        <div class="input-group"><label>Fazla Mesai:</label><input type="number" id="fm" value="0" oninput="hesapla()"></div>
        <div class="input-group"><label>Gece Zammı (Saat):</label><input type="number" id="gece-saat" value="0" oninput="hesapla()"></div>
        <div class="input-group"><label>Ulusal Bayram:</label><input type="number" id="ub" value="0" oninput="hesapla()"></div>
        <div class="input-group"><label>Dini Bayram:</label><input type="number" id="db" value="0" oninput="hesapla()"></div>
        <div class="input-group"><label>Resmi Tatil FM:</label><input type="number" id="rtfm" value="0" oninput="hesapla()"></div>
        <div class="input-group"><label>Yol Ücreti (Brüt):</label><input type="number" id="yol" value="0" oninput="hesapla()"></div>
    </div>

    <div class="result-panel">
        <div class="res-label">TAHMİNİ NET MAAŞ</div>
        <div class="res-value" id="net-maas">0,00 TL</div>
    </div>

    <div class="nav-buttons">
        <a href="sosyal.html" class="btn btn-social">🎁 Sosyal Yardımları Gör</a>
        <a href="fark.html" class="btn btn-fark">📈 Geriye Dönük Fark Hesapla</a>
    </div>

    <div class="footer">
        © 2026 Numan Özdemir | Vergi + %14 SGK Kesintisi Dahildir.
    </div>
</div>

<script>
    function hesapla() {
        const saatUcreti = parseFloat(document.getElementById('saat-ucreti').value) || 0;
        const vergi = parseFloat(document.getElementById('vergi-dilimi').value);
        
        const norm = parseFloat(document.getElementById('norm-saat').value) || 0;
        const fm = parseFloat(document.getElementById('fm').value) || 0;
        const gece = parseFloat(document.getElementById('gece-saat').value) || 0;
        const ub = parseFloat(document.getElementById('ub').value) || 0;
        const db = parseFloat(document.getElementById('db').value) || 0;
        const rtfm = parseFloat(document.getElementById('rtfm').value) || 0;
        const yol = parseFloat(document.getElementById('yol').value) || 0;

        // Brüt Hesaplama
        let brut = (norm * saatUcreti);
        brut += (fm * saatUcreti * 2);
        brut += (gece * 30); // 2026 Gece Zammı 30 TL
        brut += (ub * saatUcreti * 2);
        brut += (db * saatUcreti * 2);
        brut += (rtfm * saatUcreti * 2);
        brut += yol;

        // Net Hesaplama (%14 SGK + Vergi)
        const netCarpan = (1 - vergi) * 0.86;
        const net = brut * netCarpan;

        document.getElementById('net-maas').innerText = net.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " TL";
    }
</script>

</body>
</html>
