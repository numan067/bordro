<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Yardımlar ve Enflasyon</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #6a1b9a; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        h3 { color: #2c3e50; font-size: 18px; margin-top: 30px; border-left: 5px solid #6a1b9a; padding-left: 10px; }
        .aid-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .aid-name { font-weight: 600; color: #444; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border: 1px solid #eee; }
        th { background-color: #6a1b9a; color: white; }
        tr:nth-child(even) { background-color: #fafafa; }
        .highlight { font-weight: bold; color: #d32f2f; background-color: #fff3e0; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 25px; background-color: #6a1b9a; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sosyal Yardım Kalemleri</h2>
    <div id="yardim-listesi">
        <div class="aid-item"><span class="aid-name">Çocuk Yardımı</span><span class="aid-value">350,00 TL</span></div>
        <div class="aid-item"><span class="aid-name">Yemek Yardımı (Günlük)</span><span class="aid-value">180,00 TL</span></div>
        <div class="aid-item"><span class="aid-name">Yakacak Yardımı (Aylık)</span><span class="aid-value">500,00 TL</span></div>
    </div>

    <h3>2026 Aylık Enflasyon Verileri</h3>
    <table id="enflasyon-tablosu">
        <thead>
            <tr>
                <th>Ay (2026)</th>
                <th>Aylık TÜFE (%)</th>
                <th>6 Aylık Birikimli (%)</th>
            </tr>
        </thead>
        <tbody id="tablo-govde">
            </tbody>
    </table>
    
    <p style="font-size: 12px; color: #888; margin-top: 15px;">* Veriler girildikçe birikimli toplam otomatik hesaplanır.</p>
    <a href="index.html" class="back-btn">← Hesaplayıcıya Dön</a>
</div>

<script>
    // --- SADECE BURAYI GÜNCELLEMEN YETERLİ ---
    const aylikVeriler = [
        { ay: "Ocak", oran: 3.80 },
        { ay: "Şubat", oran: 2.95 },
        { ay: "Mart", oran: 2.10 },
        { ay: "Nisan", oran: 0 }, // Nisan açıklandığında 0'ı silip oranı yaz
        { ay: "Mayıs", oran: 0 },
        { ay: "Haziran", oran: 0 }
    ];
    // ----------------------------------------

    const tabloGovde = document.getElementById('tablo-govde');
    let birikimli = 1;

    aylikVeriler.forEach((data, index) => {
        const row = document.createElement('tr');
        let birikimliGosterim = "-";
        
        if (data.oran > 0) {
            // Birikimli Enflasyon Formülü: ((1+oran1/100)*(1+oran2/100)... - 1) * 100
            birikimli = birikimli * (1 + (data.oran / 100));
            birikimliGosterim = ((birikimli - 1) * 100).toFixed(2);
            
            // Eğer en son girilen veri ise vurgula
            if (index === aylikVeriler.findLastIndex(d => d.oran > 0)) {
                row.className = "highlight";
            }
        }

        row.innerHTML = `
            <td>${data.ay}</td>
            <td>${data.oran > 0 ? data.oran.toFixed(2) : "-"}</td>
            <td>${birikimliGosterim !== "-" ? birikimliGosterim : "-"}</td>
        `;
        tabloGovde.appendChild(row);
    });
</script>

</body>
</html>
