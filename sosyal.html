<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sosyal Yardımlar 2025-2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        
        h2 { text-align: center; color: #6a1b9a; border-bottom: 2px solid #6a1b9a; padding-bottom: 10px; margin-bottom: 20px; font-size: 20px; text-transform: uppercase; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; min-width: 550px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; }
        
        th { background-color: #f8f9fa; color: #6a1b9a; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        
        .yil-2025 { color: #555; font-weight: 500; }
        .yil-2026 { color: #6a1b9a; font-weight: bold; background-color: #f3e5f5; }
        
        .baslik { font-weight: 600; color: #2c3e50; }
        
        .back-btn { display: block; width: 100%; padding: 12px; background: #6a1b9a; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 14px; box-sizing: border-box; transition: 0.3s; }
        .back-btn:hover { background: #8e24aa; }
        
        #alt-alan { margin-top: 25px; text-align: center; width: 100%; }
