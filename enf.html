<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Enflasyon Verileri</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #d35400; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border: 1px solid #eee; }
        th { background-color: #e67e22; color: white; }
        tr:nth-child(even) { background-color: #fafafa; }
        .highlight { font-weight: bold; color: #d35400; background-color: #fef5e7 !important; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 25px; background-color: #34495e; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .info-note { font-size: 13px; color: #7f8c8d; margin-top: 15px; background: #ecf0f1; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>2026 ENFLASYON TAKİBİ</h2>
    
    <table id="enflasyon-tablosu">
        <thead>
            <tr>
                <th>Ay (2026)</th>
                <th>Aylık TÜFE (%)</th>
                <th>6 Aylık Birikimli (%)</th>
            </tr>
        </thead>
        <tbody id="tablo-govde">
            </tbody>
    </table>

    <div class="info-note">
        <strong>Bilgi:</strong> Birikimli enflasyon, Temmuz ayında yapılacak olan maaş zammı ve enflasyon farkı hesabında temel alınacak orandır.
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="back-btn">← Hesaplayıcıya Dön</a>
    </div>
</div>

<script>
    // --- GÜNCELLEME YAPACAĞIN ALAN ---
    const veriler = [
        { ay: "Ocak", oran: 3.80 },
        { ay: "Şubat", oran: 2.95 },
        { ay: "Mart", oran: 1.94 },
        { ay: "Nisan", oran: 0 }, // Açıklandığında 0'ı değiştir
        { ay: "Mayıs", oran: 0 },
        { ay: "Haziran", oran: 0 }
    ];

    const tablo = document.getElementById('tablo-govde');
    let birikimli = 1;

    veriler.forEach((d, index) => {
        const row = document.createElement('tr');
        let birikimliStr = "-";
        
        if (d.oran > 0) {
            birikimli = birikimli * (1 + (d.oran / 100));
            birikimliStr = ((birikimli - 1) * 100).toFixed(2);
            
            // Son girilen ayı vurgula
            if (index === veriler.findLastIndex(v => v.oran > 0)) {
                row.className = "highlight";
            }
        }

        row.innerHTML = `
            <td>${d.ay}</td>
            <td>${d.oran > 0 ? d.oran.toFixed(2) : "-"}</td>
            <td>${birikimliStr !== "-" ? birikimliStr : "-"}</td>
        `;
        tablo.appendChild(row);
    });
</script>

</body>
</html>
