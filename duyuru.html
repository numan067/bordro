<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duyuru</title>
    <style>
        /* Ekranın tamamını kullanması için */
        body { 
            background-color: #000000; /* Arka planı siyah yaparak fotoğrafı vurgular */
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 800px; /* Dikdörtgen fotoğrafın yayılması için */
        }

        /* Geri Dön Butonu - Çok sade ve şeffaf */
        .back-nav { 
            padding: 15px;
            width: 100%;
        }
        .back-nav a { 
            text-decoration: none; 
            color: #ffffff; 
            font-size: 14px; 
            opacity: 0.6;
        }

        /* Fotoğraf Tasarımı */
        .photo-frame { 
            width: 100%;
            line-height: 0;
        }

        .photo-frame img { 
            width: 100%; 
            height: auto; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="index.html">← Geri</a>
    </div>

    <div class="container">
        <div class="photo-frame">
            <img src="duyuru.jpg" alt="Duyuru">
        </div>
    </div>

</body>
</html>
