<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duyuru Panosu</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        .back-btn { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #64748b; font-size: 14px; font-weight: 600; float: left; }
        
        .header-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; clear: both; }
        
        /* Fotoğraf Alanı */
        .photo-frame { background: white; padding: 10px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .photo-frame img { width: 100%; height: auto; border-radius: 12px; display: block; }
        
        .footer-text { margin-top: 15px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Ana Sayfa</a>
    
    <div class="header-card">
        <h1 style="margin:0; font-size:18px;">📢 Güncel Duyurular</h1>
    </div>

    <div class="photo-frame">
        <img src="duyuru.jpg" alt="Duyuru Görseli">
    </div>

    <p class="footer-text">Duyurular düzenli olarak güncellenmektedir.</p>
</div>

</body>
</html>
