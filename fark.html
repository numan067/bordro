<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maaş Farkı Hesaplama Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-size: 0.85rem; }
        .header-box { background: #1a237e; color: white; padding: 15px; border-radius: 0 0 20px 20px; }
        .card { border-radius: 12px; border: none; margin-bottom: 15px; }
        .table input { text-align: center; padding: 2px; font-size: 0.85rem; border: 1px solid #ced4da; border-radius: 4px; width: 100%; }
        .gun-input { background-color: #fff9db; font-weight: bold; width: 50px !important; }
        .saat-otomatik { background-color: #e9ecef; font-weight: bold; width: 70px !important; }
        .net-fark-hucre { color: #d32f2f; font-weight: bold; text-align: right; min-width: 100px; }
        .tax-select { border: 2px solid #ffca28; font-weight: bold; width: 100px; }
    </style>
</head>
<body>

<div class="header-box mb-3 shadow">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h6 class="mb-0 text-uppercase ls-1">Maaş Farkı Çizelgesi (2026)</h6>
        <div class="d-flex align-items-center bg-white p-1 rounded">
            <span class="me-2 text-dark small fw-bold">Vergi:</span>
            <select id="vergiDilimi" class="form-select form-select-sm tax-select" onchange="hesapla()">
                <option value="0.15">%15</option>
                <option value="0.20">%20</option>
                <option value="0.27">%27</option>
                <option value="0.35">%35</option>
            </select>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="card shadow-sm p-3 mb-3">
        <div class="row g-2 align-items-center">
            <div class="col-6 col-md-3">
                <label class="small fw-bold">Eski Saat Ücreti:</label>
                <input type="number" id="eskiUcret" class="form-control form-control-sm" placeholder="0.00" oninput="hesapla()">
            </div>
            <div class="col-6 col-md-3">
                <label class="small fw-bold">Yeni (%16 Zamlı):</label>
                <div id="yeniUcretGoster" class="form-control form-control-sm bg-light fw-bold text-success">0,00 ₺</div>
            </div>
            <div class="col-12 col-md-6">
                <div class="alert alert-secondary py-1 px-2 mb-0 mt-2 mt-md-0 small">
                    Fark Hesabı: (Yeni Ücret - Eski Ücret) üzerinden yapılır.
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-sm table-bordered align-middle mb-0">
                <thead class="table-dark text-center">
                    <tr>
                        <th style="width: 80px;">AY</th>
                        <th>Gün</th>
                        <th>N.Saat (7.5)</th>
                        <th>%50 M.</th>
                        <th>%100 M.</th>
                        <th>Gece (S)</th>
                        <th>İkramiye</th>
                        <th>Bayram P.</th>
                        <th>Yol</th>
                        <th>NET FARK</th>
                    </tr>
                </thead>
                <tbody id="farkTableBody">
                    </tbody>
                <tfoot class="table-secondary fw-bold">
                    <tr>
                        <td colspan="9" class="text-end text-uppercase">Genel Toplam Net Alacak:</td>
                        <td id="genelToplam" class="text-end text-danger fs-6">0,00 ₺</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
const ayVerileri = [
    { ad: "OCAK", gun: 31 },
    { ad: "ŞUBAT", gun: 28 },
    { ad: "MART", gun: 31 }
];

const tbody = document.getElementById('farkTableBody');

// Tabloyu Oluştur
ayVerileri.forEach(ay => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="fw-bold text-center bg-light">${ay.ad}</td>
        <td><input type="number" class="gun-input" value="${ay.gun}" oninput="gunGuncelle(this)"></td>
        <td><input type="number" class="saat-otomatik" value="${(ay.gun * 7.5).toFixed(1)}" oninput="hesapla()"></td>
        <td><input type="number" class="m50-saat" placeholder="Saat" oninput="hesapla()"></td>
        <td><input type="number" class="m100-saat" placeholder="Saat" oninput="hesapla()"></td>
        <td><input type="number" class="gece-saat" placeholder="Saat" oninput="hesapla()"></td>
        <td><input type="number" class="i-fark" placeholder="Brüt" oninput="hesapla()"></td>
        <td><input type="number" class="b-para-fark" placeholder="Brüt" oninput="hesapla()"></td>
        <td class="text-center"><input type="checkbox" class="yol-check" checked onchange="hesapla()"></td>
        <td class="net-fark-hucre">0,00 ₺</td>
    `;
    tbody.appendChild(tr);
});

// Gün değişince saati otomatik güncelle (Gün x 7.5)
function gunGuncelle(el) {
    const gun = parseFloat(el.value) || 0;
    const saatInput = el.closest('tr').querySelector('.saat-otomatik');
    saatInput.value = (gun * 7.5).toFixed(1);
    hesapla();
}

function hesapla() {
    const eski = parseFloat(document.getElementById('eskiUcret').value) || 0;
    const yeni = eski * 1.16;
    const fark = yeni - eski;
    
    document.getElementById('yeniUcretGoster').innerText = yeni.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + " ₺";

    const vergi = parseFloat(document.getElementById('vergiDilimi').value);
    const damga = 0.00759;
    const kesinti = 1 - (vergi + damga);

    let toplamGenel = 0;

    document.querySelectorAll('#farkTableBody tr').forEach(row => {
        // Normal çalışma saati üzerinden fark (Normal mesai matrahı gibi)
        const nSaat = parseFloat(row.querySelector('.saat-otomatik').value) || 0;
        const nFarkBrut = nSaat * fark;

        // Mesai farkları (Çarpanlı)
        const m50 = (parseFloat(row.querySelector('.m50-saat').value) || 0) * fark * 1.5;
        const m100 = (parseFloat(row.querySelector('.m100-saat').value) || 0) * fark * 2.0;
        
        // Sabit kalem farkları
        const gece = (parseFloat(row.querySelector('.gece-saat').value) || 0) * 7.19;
        const yol = row.querySelector('.yol-check').checked ? 940.70 : 0;
        
        // Brüt olarak girilen farklar
        const ikramiye = parseFloat(row.querySelector('.i-fark').value) || 0;
        const bPara = parseFloat(row.querySelector('.b-para-fark').value) || 0;

        const toplamBrut = nFarkBrut + m50 + m100 + gece + yol + ikramiye + bPara;
        const netFark = toplamBrut * kesinti;

        row.querySelector('.net-fark-hucre').innerText = netFark.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + " ₺";
        toplamGenel += netFark;
    });

    document.getElementById('genelToplam').innerText = toplamGenel.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + " ₺";
}

// İlk hesaplama
window.onload = hesapla;
</script>

</body>
</html>
