<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordro Fark Hesaplama</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .header-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .header-inputs label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        .header-inputs input, .header-inputs select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        .month-card { border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 15px; background: #fff; position: relative; }
        .month-title { font-weight: bold; color: #3498db; margin-bottom: 10px; text-transform: uppercase; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .input-group label { font-size: 10px; color: #666; display: block; }
        .input-group input, .input-group select { width: 100%; padding: 5px; border: 1px solid #eee; border-radius: 4px; font-size: 12px; }

        .result-section { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .total-fark { font-size: 24px; font-weight: bold; color: #2ecc71; margin-top: 10px; }
        
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fark Bordrosu (Ocak-Mart)</h2>

    <div class="header-inputs">
        <div>
            <label>Eski Saat Ücreti</label>
            <input type="number" id="eski_su" value="380.71" step="0.01" oninput="hesapla()">
        </div>
        <div>
            <label>Yeni Saat Ücreti</label>
            <input type="number" id="yeni_su" value="0" step="0.01" oninput="hesapla()">
        </div>
        <div>
            <label>Vergi Dilimi (%)</label>
            <select id="vergi_dilimi" onchange="hesapla()">
                <option value="0.15">15</option>
                <option value="0.20">20</option>
                <option value="0.27">27</option>
                <option value="0.35">35</option>
            </select>
        </div>
    </div>

    <div class="month-card">
        <div class="month-title">Ocak Ayı Kalemleri</div>
        <div class="input-grid">
            <div class="input-group"><label>Aylık Çalışma</label><input type="number" id="h1_cs" value="232.5" oninput="hesapla()"></div>
            <div class="input-group"><label>Fazla Mesai</label><input type="number" id="h1_fm" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Ulusal Bayram</label><input type="number" id="h1_ub" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Dini Bayram</label><input type="number" id="h1_db" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Resmi Tatil FM</label><input type="number" id="h1_rfm" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Yol Yardımı</label><select id="h1_yol" onchange="hesapla()"><option value="0">Yok</option><option value="1">Var (711 TL)</option></select></div>
        </div>
    </div>

    <div class="month-card">
        <div class="month-title">Şubat Ayı Kalemleri</div>
        <div class="input-grid">
            <div class="input-group"><label>Aylık Çalışma</label><input type="number" id="h2_cs" value="210" oninput="hesapla()"></div>
            <div class="input-group"><label>Fazla Mesai</label><input type="number" id="h2_fm" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Ulusal Bayram</label><input type="number" id="h2_ub" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Dini Bayram</label><input type="number" id="h2_db" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Resmi Tatil FM</label><input type="number" id="h2_rfm" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Yol Yardımı</label><select id="h2_yol" onchange="hesapla()"><option value="0">Yok</option><option value="1">Var (711 TL)</option></select></div>
        </div>
    </div>

    <div class="month-card">
        <div class="month-title">Mart Ayı Kalemleri</div>
        <div class="input-grid">
            <div class="input-group"><label>Aylık Çalışma</label><input type="number" id="h3_cs" value="232.5" oninput="hesapla()"></div>
            <div class="input-group"><label>Fazla Mesai</label><input type="number" id="h3_fm" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Ulusal Bayram</label><input type="number" id="h3_ub" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Dini Bayram</label><input type="number" id="h3_db" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Resmi Tatil FM</label><input type="number" id="h3_rfm" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Yol Yardımı</label><select id="h3_yol" onchange="hesapla()"><option value="0">Yok</option><option value="1">Var (711 TL)</option></select></div>
        </div>
    </div>

    <div class="result-section">
        <div class="result-item"><span>Ocak Net Fark:</span><span id="res_1">0,00 TL</span></div>
        <div class="result-item"><span>Şubat Net Fark:</span><span id="res_2">0,00 TL</span></div>
        <div class="result-item"><span>Mart Net Fark:</span><span id="res_3">0,00 TL</span></div>
        <div class="result-item"><span style="color:#f1c40f">İkramiye Farkı (225 Sa):</span><span id="res_ikr" style="color:#f1c40f">0,00 TL</span></div>
        <div class="total-label">TOPLAM NET FARK</div>
        <div class="total-fark" id="toplam_fark">0,00 TL</div>
    </div>
</div>

<script>
function hesapla() {
    const eskiSU = parseFloat(document.getElementById('eski_su').value) || 0;
    const yeniSU = parseFloat(document.getElementById('yeni_su').value) || 0;
    const suFark = yeniSU - eskiSU;
    const vo = parseFloat(document.getElementById('vergi_dilimi').value);
    
    if (suFark <= 0) {
        // Fark yoksa sıfırla
        ["res_1","res_2","res_3","res_ikr","toplam_fark"].forEach(id => document.getElementById(id).innerText = "0,00 TL");
        return;
    }

    let toplamNet = 0;
    const format = (n) => n.toLocaleString('tr-TR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " TL";

    // İKRAMİYE FARKI HESABI (225 Saat üzerinden Net)
    const ikrBrut = suFark * 225;
    const ikrSgk = ikrBrut * 0.15;
    const ikrMatrah = ikrBrut - ikrSgk;
    const ikrGv = ikrMatrah * vo;
    const ikrDv = ikrBrut * 0.00759;
    const ikrNet = ikrBrut - ikrSgk - ikrGv - ikrDv;
    document.getElementById('res_ikr').innerText = format(ikrNet);

    // AYLIK HESAPLAMALAR
    for(let i=1; i<=3; i++) {
        const cs = parseFloat(document.getElementById(`h${i}_cs`).value) || 0;
        const fm = parseFloat(document.getElementById(`h${i}_fm`).value) || 0;
        const ub = parseFloat(document.getElementById(`h${i}_ub`).value) || 0;
        const db = parseFloat(document.getElementById(`h${i}_db`).value) || 0;
        const rfm = parseFloat(document.getElementById(`h${i}_rfm`).value) || 0;
        const yolVar = document.getElementById(`h${i}_yol`).value == "1";
        
        // Brüt Fark Kalemleri
        const normalFark = cs * suFark;
        const fmFark = (fm + ub) * suFark * 2;
        const dbFark = db * suFark * 2.5;
        const rfmFark = rfm * suFark * 3;
        const yolFark = yolVar ? 711.13 : 0; // Sabit yol farkı varsayımı (güncellenebilir)

        const brutFark = normalFark + fmFark + dbFark + rfmFark + yolFark;

        // Kesintiler
        const sgkFark = brutFark * 0.15;
        const sendikaFark = suFark * 7; // Senin istediğin sendika formülü
        
        const matrahFark = brutFark - sgkFark - sendikaFark;
        const gvFark = matrahFark * vo;
        const dvFark = brutFark * 0.00759;

        const netFark = brutFark - sgkFark - gvFark - dvFark - sendikaFark;
        
        document.getElementById(`res_${i}`).innerText = format(netFark);
        toplamNet += netFark;
    }

    toplamNet += ikrNet;
    document.getElementById('toplam_fark').innerText = format(toplamNet);
}

// Sayfa açıldığında otomatik bir kez çalıştır
window.onload = hesapla;
</script>

</body>
</html>
