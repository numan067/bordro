<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Maaş ve Fark Takibi</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 15px 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 12px; border-bottom: 2px solid #6a1b9a; padding-bottom: 8px; font-size: 16px; }
        
        .top-options { display: flex; gap: 8px; margin-bottom: 12px; background: #f9f2ff; padding: 10px; border-radius: 8px; }
        .option-group { flex: 1; display: flex; flex-direction: column; }
        .option-group label { font-size: 9px; font-weight: bold; color: #6a1b9a; margin-bottom: 2px; text-transform: uppercase; }
        .option-group select, .option-group input { padding: 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; background-color: #fff; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 2px; font-weight: 600; color: #555; font-size: 9.5px; }
        .input-group input { padding: 7px; border: 1px solid #ccc; border-radius: 5px; font-size: 12px; }
        
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10.5px; text-align: left; }
        .summary-table th { color: #888; padding: 5px; border-bottom: 1px solid #eee; text-transform: uppercase; font-size: 8.5px; }
        .summary-table td { padding: 8px 5px; border-bottom: 1px solid #f9f9f9; font-weight: 600; color: #2c3e50; }
        .yol-select { padding: 2px; font-size: 10px; border-radius: 4px; border: 1px solid #ccc; }

        .net-maas-box { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: #fff; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; }
        .net-maas-label { font-size: 11px; margin-bottom: 2px; opacity: 0.9; text-transform: uppercase; }
        .net-maas-value { font-size: 24px; font-weight: 800; }
        
        .bottom-buttons { display: flex; justify-content: space-between; margin-top: 12px; gap: 8px; }
        .bottom-buttons button { flex: 1; padding: 9px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px; background-color: #ecf0f1; color: #34495e; }

        @media (max-width: 480px) { .input-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Maaş Farkı ve Toplam Alacak</h2>
        
        <div class="top-options">
            <div class="option-group">
                <label>Saat Ücreti Farkı:</label>
                <input type="number" id="saat-ucreti" step="0.01" value="0" oninput="hesapla()">
            </div>
            <div class="option-group">
                <label>Vergi Dilimi (%)</label>
                <select id="tax-rate" onchange="hesapla()">
                    <option value="0.15">15</option><option value="0.20">20</option>
                    <option value="0.27">27</option><option value="0.35">35</option>
                </select>
            </div>
            <div class="option-group">
                <label>Yol Farkı (Brüt)</label>
                <input type="number" id="yol-brut-fark" value="0" oninput="hesapla()">
            </div>
        </div>
        
        <div class="input-grid">
            <div class="input-group"><label>Toplam Fazla Mesai (Sa):</label><input type="number" id="fm-100" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Ulusal Bayram (Sa):</label><input type="number" id="ulusal-100" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Dini Bayram (Sa):</label><input type="number" id="dini-150" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Resmi Tatil FM (Sa):</label><input type="number" id="resmi-200" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Vakıf Kesintisi %:</label><input type="number" id="vakif-yuzde" value="0" oninput="hesapla()"></div>
            <div class="input-group"><label>Aylık Gece Zammı (Sa):</label><input type="number" id="gece-zammi" value="0" oninput="hesapla()"></div>
        </div>

        <table class="summary-table">
            <thead>
                <tr>
                    <th>Dönem</th>
                    <th>Yol?</th>
                    <th>Net Maaş Farkı</th>
                    <th>Net İkramiye Farkı</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>OCAK</td><td><select id="yol-1" class="yol-select" onchange="hesapla()"><option value="0">Yok</option><option value="1">Var</option></select></td><td id="row1-m">0,00</td><td id="row1-i">0,00</td></tr>
                <tr><td>ŞUBAT</td><td><select id="yol-2" class="yol-select" onchange="hesapla()"><option value="0">Yok</option><option value="1">Var</option></select></td><td id="row2-m">0,00</td><td id="row2-i">0,00</td></tr>
                <tr><td>MART</td><td><select id="yol-3" class="yol-select" onchange="hesapla()"><option value="0">Yok</option><option value="1">Var</option></select></td><td id="row3-m">0,00</td><td id="row3-i">0,00</td></tr>
            </tbody>
        </table>

        <div class="net-maas-box">
            <div class="net-maas-label">Toplam Net Alacak (3 Aylık)</div>
            <div class="net-maas-value" id="toplam-alacak">0,00 TL</div>
        </div>
