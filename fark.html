<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maaş Farkı Hesapla - 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #6a1b9a; padding-bottom: 10px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 13px; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        
        .month-section { border-left: 4px solid #6a1b9a; padding-left: 15px; margin-bottom: 25px; background: #fff; padding: 10px; border-radius: 0 8px 8px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .month-title { font-weight: bold; color: #6a1b9a; margin-bottom: 10px; font-size: 16px; border-bottom: 1px dashed #ddd; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .result-box { background: #6a1b9a; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .result-label { font-size: 14px; opacity: 0.9; }
        .result-value { font-size: 28px; font-weight: 800; margin-top: 5px; }

        .btn-calc { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .back-btn { display: block; width: 100%; padding: 12px; background: #ecf0f1; color: #34495e; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 10px; font-size: 14px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Maaş Farkı Hesapla</h2>

        <div class="input-group">
            <label>Eski Saat Ücreti (Brüt):</label>
            <input type="number" id="eski-saat" placeholder="Örn: 100" oninput="hesapla()">
        </div>
        <div class="input-group">
            <label>Vergi Dilimi Seçiniz:</label>
            <select id="vergi-orani" onchange="hesapla()">
                <option value="0.15">15% (Ocak/Şubat Geneli)</option>
                <option value="0.20">20%</option>
                <option value="0.27">27%</option>
            </select>
        </div>

        <div class="month-section">
            <div class="month-title">OCAK AYI</div>
            <div class="grid">
                <div class="input-group"><label>Norm. Çalışma (Saat):</label><input type="number" class="ocak-saat" value="225" oninput="hesapla()"></div>
                <div class="input-group"><label>Mesai/Bayram (Saat):</label><input type="number" class="ocak-mesai" value="0" oninput="hesapla()"></div>
            </div>
        </div>

        <div class="month-section">
            <div class="month-title">ŞUBAT AYI</div>
            <div class="grid">
                <div class="input-group"><label>Norm. Çalışma (Saat):</label><input type="number" class="subat-saat" value="225" oninput="hesapla()"></div>
                <div class="input-group"><label>Mesai/Bayram (Saat):</label><input type="number" class="subat-mesai" value="0" oninput="hesapla()"></div>
            </div>
        </div>

        <div class="month-section">
            <div class="month-title">MART AYI</div>
            <div class="grid">
                <div class="input-group"><label>Norm. Çalışma (Saat):</label><input type="number" class="mart-saat" value="225" oninput="hesapla()"></div>
                <div class="input-group"><label>Mesai/Bayram (Saat):</label><input type="number" class="mart-mesai" value="0" oninput="hesapla()"></div>
            </div>
        </div>

        <div class="month-section" style="border-left-color: #f39c12;">
            <div class="month-title" style="color: #f39c12;">İKRANİYE FARKI (1 Adet)</div>
            <div class="input-group"><label>İkramiye Gün Sayısı:</label><input type="number" id="ikramiye-gun" value="30" oninput="hesapla()"></div>
        </div>

        <div class="result-box">
            <div class="result-label">Tahmini Toplam Net Fark (Yol/BES Hariç)</div>
            <div class="result-value" id="toplam-fark">0,00 TL</div>
        </div>

        <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
    </div>

    <script>
        function hesapla() {
            const eskiSaat = parseFloat(document.getElementById('eski-saat').value) || 0;
            const yeniSaat = eskiSaat * 1.16; // %16 zam
            const fark = yeniSaat - eskiSaat;
            const vergi = parseFloat(document.getElementById('vergi-orani').value);
            const netCarpan = (1 - vergi) * 0.86; // Gelir vergisi + %14 SGK kesintisi (Kabaca netleştirme)

            // Saatleri çek
            const aylar = [
                { s: '.ocak-saat', m: '.ocak-mesai' },
                { s: '.subat-saat', m: '.subat-mesai' },
                { s: '.mart-saat', m: '.mart-mesai' }
            ];

            let toplamBrutFark = 0;

            aylar.forEach(ay => {
                const norm = parseFloat(document.querySelector(ay.s).value) || 0;
                const mesai = parseFloat(document.querySelector(ay.m).value) || 0;
                
                // Normal çalışma farkı + Mesai farkı (Mesai genelde %100 zamlıdır, bu yüzden fark x2)
                toplamBrutFark += (norm * fark) + (mesai * fark * 2);
            });

            // İkramiye Farkı Hesapla (Günlük ücret üzerinden: Saat ücreti x 7.5)
            const ikramiyeGun = parseFloat(document.getElementById('ikramiye-gun').value) || 0;
            toplamBrutFark += (ikramiyeGun * 7.5 * fark);

            const toplamNetFark = toplamBrutFark * netCarpan;

            document.getElementById('toplam-fark').innerText = toplamNetFark.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " TL";
        }
    </script>
</body>
</html>
