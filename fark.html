<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maaş Farkı Hesapla - 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { background-color: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #6a1b9a; font-size: 20px; border-bottom: 2px solid #6a1b9a; padding-bottom: 10px; margin-top: 5px; }
        
        /* Üstteki Ortak Alan */
        .global-settings { background: #f3e5f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ce93d8; }
        .global-settings label { color: #4a148c; font-weight: bold; }
        
        .month-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #6a1b9a; }
        .month-title { font-weight: bold; color: #6a1b9a; margin-bottom: 12px; font-size: 15px; display: flex; justify-content: space-between; }
        
        .input-row { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; font-weight: 600; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .summary-box { background: #6a1b9a; color: white; padding: 15px; border-radius: 12px; text-align: center; position: sticky; bottom: 10px; box-shadow: 0 -4px 10px rgba(0,0,0,0.2); margin-top: 20px; }
        .total-value { font-size: 26px; font-weight: 800; margin-top: 5px; }

        .back-btn { display: block; width: 100%; padding: 12px; background: #eee; color: #333; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>FARK HESAPLAYICI (2026)</h2>

    <div class="global-settings">
        <div class="grid">
            <div class="input-row">
                <label>Eski Saat Ücreti:</label>
                <input type="number" id="eski-saat" placeholder="0.00" oninput="hesapla()">
            </div>
            <div class="input-row">
                <label>Ortak Vergi Dilimi:</label>
                <select id="vergi-orani" onchange="hesapla()">
                    <option value="0.15">%15 Vergi</option>
                    <option value="0.20">%20 Vergi</option>
                    <option value="0.27">%27 Vergi</option>
                </select>
            </div>
        </div>
    </div>

    <div id="aylar-listesi">
        </div>

    <div class="month-card" style="border-left-color: #ff9800; background: #fffcf5;">
        <div class="month-title" style="color: #e65100;">İKRANİYE FARKI</div>
        <div class="input-row">
            <label>İkramiye Gün Sayısı (Örn: 30):</label>
            <input type="number" id="ikr-gun" value="30" oninput="hesapla()">
        </div>
    </div>

    <div class="summary-box">
        <div style="font-size: 12px; opacity: 0.9;">TÜM AYLAR TOPLAM NET FARK</div>
        <div class="total-value" id="toplam-fark">0,00 TL</div>
    </div>

    <a href="index.html" class="back-btn">← ANA SAYFAYA DÖN</a>
</div>

<script>
    const aylar = ["OCAK", "ŞUBAT", "MART"];
    const liste = document.getElementById('aylar-listesi');

    // Ay kartlarını oluştur (Senin paylaştığın görseldeki tüm kalemler dahil)
    aylar.forEach(ay => {
        liste.innerHTML += `
        <div class="month-card">
            <div class="month-title">${ay} AYI VERİLERİ</div>
            <div class="input-row">
                <label>Normal Çalışma (Saat):</label>
                <input type="number" class="norm-saat" value="225" oninput="hesapla()">
            </div>
            <div class="grid">
                <div class="input-row"><label>Fazla Mesai:</label><input type="number" class="fm" value="0" oninput="hesapla()"></div>
                <div class="input-row"><label>Gece Zammı (Saat):</label><input type="number" class="gece" value="0" oninput="hesapla()"></div>
                <div class="input-row"><label>Ulusal Bayram:</label><input type="number" class="ub" value="0" oninput="hesapla()"></div>
                <div class="input-row"><label>Dini Bayram:</label><input type="number" class="db" value="0" oninput="hesapla()"></div>
                <div class="input-row"><label>Resmi Tatil FM:</label><input type="number" class="rtfm" value="0" oninput="hesapla()"></div>
                <div class="input-row"><label>Yol Ücreti Farkı:</label><input type="number" class="yol" value="0" oninput="hesapla()"></div>
            </div>
        </div>`;
    });

    function hesapla() {
        const eskiSaat = parseFloat(document.getElementById('eski-saat').value) || 0;
        const fark = eskiSaat * 0.16; // %16 zam farkı
        const vergi = parseFloat(document.getElementById('vergi-orani').value);
        const netCarpan = (1 - vergi) * 0.86; // Vergi + %14 SGK kesintisi

        let toplamBrutFark = 0;

        document.querySelectorAll('.month-card').forEach(card => {
            const norm = parseFloat(card.querySelector('.norm-saat')?.value) || 0;
            const fm = parseFloat(card.querySelector('.fm')?.value) || 0;
            const gece = parseFloat(card.querySelector('.gece')?.value) || 0;
            const ub = parseFloat(card.querySelector('.ub')?.value) || 0;
            const db = parseFloat(card.querySelector('.db')?.value) || 0;
            const rtfm = parseFloat(card.querySelector('.rtfm')?.value) || 0;
            const yol = parseFloat(card.querySelector('.yol')?.value) || 0;

            // Hesaplama Formülleri
            toplamBrutFark += (norm * fark);
            toplamBrutFark += (fm * fark * 2); // Mesai %100 fark
            toplamBrutFark += (gece * (30 - 22.81)); // Gece zammı sabit fark
            toplamBrutFark += (ub * fark * 2);
            toplamBrutFark += (db * fark * 2);
            toplamBrutFark += (rtfm * fark * 2);
            toplamBrutFark += yol; // Yol farkı direkt eklenir
        });

        // İkramiye
        const ikrGun = parseFloat(document.getElementById('ikr-gun').value) || 0;
        toplamBrutFark += (ikrGun * 7.5 * fark);

        const toplamNet = toplamBrutFark * netCarpan;
        document.getElementById('toplam-fark').innerText = toplamNet.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " TL";
    }
</script>

</body>
</html>
