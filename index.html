<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Maaş Hesaplama 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        .header-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; }
        .header-card h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .menu-item { background: white; border-radius: 18px; padding: 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .full-width { grid-column: span 2; }
        .menu-item span { font-weight: 700; font-size: 13px; color: #334155; }
        .simple-announcement { background: #fff1f0; border: 1px solid #ffa39e; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center; }
        #duyuru-icerik { font-size: 13px; color: #cf1322; font-weight: 600; }
        .card { background: white; border-radius: 18px; padding: 20px; border: 1px solid #f1f5f9; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h1>MAAŞ HESAPLAMA 2026</h1>
        <p>LABORATUVAR ANALİZ SİSTEMİ</p>
    </div>

    <div class="menu-grid">
        <a href="hesapla.html" class="menu-item"><span>💰 Maaş Hesaplama</span></a>
        <a href="sosyal.html" class="menu-item"><span>📝 Sosyal Haklar</span></a>
        <a href="fark.html" class="menu-item full-width"><span>⚖️ Fark Hesaplama</span></a>
    </div>

    <div class="simple-announcement">
        <div id="duyuru-icerik">Veriler kontrol ediliyor...</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size:15px;">📈 Enflasyon Verileri</h3>
        <p style="font-size:14px; margin:5px 0;">Ocak: %4,84 | Şubat: %2,96 | Mart: %1,94</p>
    </div>

    <a href="tes.html" style="text-decoration:none; display:block; text-align:center; padding:15px; background:#f0f9ff; color:#0369a1; border-radius:15px; font-weight:bold; font-size:13px;">
        💡 Görüş Bildirin
    </a>
</div>

<script>
    // Tarayıcıyı kitlememek için hata payını düşüren script
    async function duyuruYukle() {
        const d = document.getElementById('duyuru-icerik');
        try {
            const v = new Date().getTime();
            const r = await fetch('duyuru.html?v=' + v, { cache: 'no-store' });
            if (r.ok) {
                d.innerHTML = await r.text();
            } else {
                d.innerText = "Sistem aktif.";
            }
        } catch (e) {
            d.innerText = "Bağlantı başarılı.";
        }
    }
    window.onload = duyuruYukle;
</script>

</body>
</html>
