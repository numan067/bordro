<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Ücret Hesaplama</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #f59e0b;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* Ana Başlık */
        .main-title {
            text-align: center;
            color: var(--primary);
            font-size: 24px;
            font-weight: 800;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Buton Grubu */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            color: white;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-maas { background: #2563eb; }
        .btn-fark { background: #8b5cf6; }
        .btn-sosyal { background: #10b981; }
        .btn:active { transform: scale(0.98); }

        /* Duyuru Panosu (Fotoğraf) */
        .duyuru-container {
            width: 100%;
            margin-bottom: 25px;
            line-height: 0;
        }

        .duyuru-img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Enflasyon Kartı */
        .stats-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stats-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .stats-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 17px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .data-row span:first-child { color: #64748b; }
        .data-row span:last-child { font-weight: 700; color: var(--primary); }

        .total-box {
            margin-top: 15px;
            background: #fffcf0;
            border: 2px dashed var(--accent);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-val { color: #854d0e; font-weight: 900; font-size: 20px; }
        
        .footer { text-align: center; color: #94a3b8; font-size: 11px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    
    <h1 class="main-title">2026 ÜCRET HESAPLAMA</h1>

    <div class="btn-group">
        <a href="hesapla.html" class="btn btn-maas">Maaş Hesaplama</a>
        <a href="fark.html" class="btn btn-fark">Fark Hesaplama</a>
        <a href="sosyal.html" class="btn btn-sosyal">Sosyal Haklar</a>
    </div>

    <div class="duyuru-container">
        <img src="duyuru.jpg" alt="Duyuru" class="duyuru-img">
    </div>

    <div class="stats-card">
        <div class="stats-header">
            <span style="margin-right: 8px;">📊</span>
            <h2>2026 Enflasyon Verileri</h2>
        </div>

        <div class="data-row"><span>Ocak 2026</span><span>%4,84</span></div>
        <div class="data-row"><span>Şubat 2026</span><span>%2,96</span></div>
        <div class="data-row"><span>Mart 2026</span><span>%1,94</span></div>
        <div class="data-row"><span>Nisan 2026</span><span>%4,18</span></div>
       <div class="data-row"><span>Mayıs 2026</span><span>%1,71</span></div>
       <div class="data-row"><span>Haziran 2026</span><span>%0,99</span></div>
        <div class="total-box">
            <span style="color: #854d0e; font-weight: 700; font-size: 13px;">6 AYLIK BİLEŞİK TOPLAM</span>
            <span class="total-val">%17,76</span>
        </div>
    </div>

    <div class="footer">
        © 2026 Numan Özdemir - Bordro Sistemleri<br>
        <a href="tes.html" style="color: #94a3b8; text-decoration: none; margin-top: 5px; display: inline-block;">Görüş ve Öneriler</a>
    </div>

</div>

</body>
</html>
