<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Maaş ve Enflasyon Takibi</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { color: #1a237e; margin-top: 0; border-bottom: 2px solid #1a237e; padding-bottom: 10px; font-size: 18px; }
        h3 { color: #2c3e50; font-size: 15px; margin-bottom: 15px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; text-align: center; text-decoration: none; color: #34495e; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .menu-item:active { transform: scale(0.95); background: #f8f9fa; }
        .menu-item i { font-size: 24px; color: #1a237e; }
        .menu-item span { font-weight: 600; font-size: 13px; }

        .inf-list { list-style: none; padding: 0; margin: 0; }
        .inf-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .inf-list li:last-child { border-bottom: none; }
        
        .bilesik-box { background: #fffde7; padding: 12px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px dashed #ffd54f; }
        .bilesik-label { font-size: 11px; font-weight: bold; color: #795548; }
        .bilesik-value { font-size: 18px; font-weight: 800; color: #e67e22; }

        .suggestion-box { background: #e3f2fd; border: 1px solid #90caf9; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .suggestion-box:hover { background: #e1f5fe; }
        .suggestion-box span { font-size: 13px; color: #0d47a1; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="text-align: center; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: white;">
        <h1 style="margin: 0; font-size: 22px;">Numan Özdemir</h1>
        <p style="margin: 5px 0 0; opacity: 0.8; font-size: 12px;">2026 Maaş & Fark Takip Sistemi</p>
    </div>

    <div class="card">
        <h3>İşlemler</h3>
        <div class="menu-grid">
            <a href="hesapla.html" class="menu-item">
                <span style="font-size: 24px;">📊</span>
                <span>Fark Hesapla</span>
            </a>
            <a href="sosyal.html" class="menu-item">
                <span style="font-size: 24px;">🎁</span>
                <span>Sosyal Haklar</span>
            </a>
        </div>
    </div>

    <div class="card">
        <h3>2026 Enflasyon Verileri</h3>
        <ul class="inf-list">
            <li><span>Ocak Enflasyonu</span> <strong>%4,50</strong></li>
            <li><span>Şubat Enflasyonu</span> <strong>%3,20</strong></li>
            <li><span>Mart Enflasyonu</span> <strong>%2,80</strong></li>
        </ul>
        <div class="bilesik-box">
            <span class="bilesik-label">TOPLAM BİLEŞİK ENFLASYON</span>
            <span class="bilesik-value">%10,88</span>
        </div>
    </div>

    <div class="suggestion-box" onclick="location.href='tes.html'">
        <span>💡 Görüş ve Önerilerinizi Bildirin</span>
    </div>
    
    <p style="text-align: center; font-size: 10px; color: #aaa; margin-top: 20px;">© 2026 Tüm Hakları Saklıdır</p>
</div>

</body>
</html>
