<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Maaş Hesaplayıcı</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 25px 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #000; margin-bottom: 5px; font-weight: bold; }
        p.subtitle { text-align: left; color: #000; margin-bottom: 20px; font-size: 16px; }
        
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { margin-bottom: 5px; font-weight: bold; color: #000; font-size: 18px; }
        .input-group input, .input-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background-color: #fff; width: 100%; box-sizing: border-box; }

        .results { border-top: 1px solid #eee; margin-top: 20px; padding-top: 15px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #000; }
        
        /* Buton Alanı */
        .bottom-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .bottom-buttons button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; color: #000; cursor: pointer; font-size: 14px; text-align: center; transition: background 0.2s; }
        .bottom-buttons button:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Net Maaş Hesaplayıcı</h2>
    <p class="subtitle">Lütfen bordronuzdaki değerleri giriniz:</p>

    <div class="input-group">
        <label>Ay</label>
        <select id="month">
            <option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option>
            <option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option>
            <option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option>
            <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
        </select>
    </div>

    <div class="input-group">
        <label>Saatlik Ücret</label>
        <input type="text" id="saat-ucreti" placeholder="318,13">
    </div>

    <div class="input-group">
        <label>Çalışma Gün Saati</label>
        <input type="text" id="calisma-gun-saati" placeholder="232,5">
    </div>

    <div class="input-group">
        <label>Fazla Mesai Saati</label>
        <input type="text" id="fazla-mesai-saati" placeholder="4">
    </div>

    <div class="input-group">
        <label>Gece Zammı (Saat)</label>
        <input type="text" id="gece-zammi" placeholder="78">
    </div>

    <div class="input-group">
        <label>Ulusal Bayram Çalışması (Saat)</label>
        <input type="text" id="ulusal-bayram" placeholder="7,5">
    </div>

    <div class="input-group">
        <label>Dini Bayram Çalışması (Saat)</label>
        <input type="text" id="dini-bayram" placeholder="0">
    </div>

    <div class="input-group">
        <label>Resmi Tatil (Saat)</label>
        <input type="text" id="resmi-tatil" placeholder="0">
    </div>

    <div class="input-group">
        <label>Yol Ücreti</label>
        <input type="text" id="yol-ucreti" placeholder="0">
    </div>

    <div class="input-group">
        <label>Net BES Kesintisi</label>
        <input type="text" id="bes-kesintisi" placeholder="2520,75">
    </div>

    <div class="input-group">
        <label>Vakıf Kesintisi Yüzdesi</label>
        <input type="text" id="vakif-kesintisi-yuzde" placeholder="10">
    </div>

    <div class="input-group">
        <label>Gelir Vergisi Oranı (%)</label>
        <select id="tax-rate">
            <option value="0.15">15%</option>
            <option value="0.20">20%</option>
            <option value="0.27">27%</option>
            <option value="0.35">35%</option>
        </select>
    </div>

    <div class="results">
        <div class="result-item"><span>Toplam Brüt:</span><span id="toplam-brut">0.00</span></div>
        <div class="result-item"><span>Net İkramiye:</span><span id="net-ikramiye">0.00</span></div>
        <div class="result-item"><span>Net Maaş:</span><span id="net-maas">0.00</span></div>
    </div>

    <div class="bottom-buttons">
        <button onclick="window.open('https://bordro.pages.dev/tes.html', '_blank')">Görüş, öneri ve teşekkür</button>
        <button onclick="window.open('https://bordro.pages.dev/sosyal.html', '_blank')">Sosyal yardımlar</button>
        <button onclick="window.open('https://bordro.pages.dev/enf.html', '_blank')">Enflasyon verileri</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
