        <span style="font-size: 12px; color: #555;">TOPLAM BİLEŞİK ENFLASYON:</span><br>
        <strong style="font-size: 20px; color: #e67e22;" id="compound-inflation">%10,88</strong>

<script>
    // Dinamik hesaplama istersen bu mantığı kullanabilirsin:
    // (1.0450 * 1.0320 * 1.0280) - 1 = 0.1088... (%10,88)
    function bilesikHesapla() {
        const oranlar = [4.50, 3.20, 2.80]; // Aylık enflasyonlar
        let sonuc = 1;
        oranlar.forEach(oran => {
            sonuc *= (1 + (oran / 100));
        });
        const final = ((sonuc - 1) * 100).toFixed(2);
        document.getElementById('compound-inflation').innerText = '%' + final.replace('.', ',');
    }
    // Veriler değiştikçe bu fonksiyonu çağırabilirsin.
</script>
