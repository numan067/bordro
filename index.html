<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Maaş Hesaplayıcı 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 25px 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { margin-bottom: 5px; font-weight: 600; color: #444; font-size: 14px; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; }
        .input-group input:focus { border-color: #6a1b9a; }

        .results { border-top: 2px solid #eee; margin-top: 20px; padding-top: 15px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #555; }
        .result-item.total { font-weight: bold; color: #2c3e50; font-size: 18px; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px; }
        
        .bottom-buttons { display: flex; flex-wrap: wrap; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .bottom-buttons button { flex: 1; min-width: 140px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.3s; }
        
        /* Buton Renkleri */
        .btn-tes { background-color: #ecf0f1; color: #34495e; }
        .btn-sos { background-color: #6a1b9a; color: white; }
        .btn-enf { background-color: #f39c12; color: white; }
        
        .bottom-buttons button:hover { opacity: 0.8; transform: translateY(-2px); }

        @media (max-width: 480px) {
            .bottom-buttons button { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Net Maaş Hesaplayıcı</h2>
    <p class="subtitle">Lütfen bordronuzdaki değerleri giriniz:</p>

    <div class="input-group">
        <label>Ay</label>
        <select id="month">
            <option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option>
            <option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option>
            <option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option>
            <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
        </select>
    </div>

    <div class="input-group">
        <label>Saatlik Ücret</label>
        <input type="number" id="saat-ucreti" placeholder="0.00" step="0.01">
    </div>

    <div class="input-group">
        <label>Çalışma Gün Saati</label>
        <input type="number" id="calisma-gun-saati" placeholder="225">
    </div>

    <div class="input-group">
        <label>Fazla Mesai Saati</label>
        <input type="number" id="fazla-mesai-saati" placeholder="0">
    </div>

    <div class="input-group">
        <label>Gece Zammı (Saat)</label>
        <input type="number" id="gece-zammi" placeholder="0">
    </div>

    <div class="input-group">
        <label>Ulusal Bayram Çalışması (Saat)</label>
        <input type="number" id="ulusal-bayram" placeholder="0">
    </div>

    <div class="input-group">
        <label>Dini Bayram Çalışması (Saat)</label>
        <input type="number" id="dini-bayram" placeholder="0">
    </div>

    <div class="input-group">
        <label>Resmi Tatil (Saat)</label>
        <input type="number" id="resmi-tatil" placeholder="0">
    </div>

    <div class="input-group">
        <label>Yol Ücreti (Brüt)</label>
        <input type="number" id="yol-ucreti" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>Net BES Kesintisi</label>
        <input type="number" id="bes-kesintisi" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>Vakıf Kesintisi Yüzdesi (%)</label>
        <input type="number" id="vakif-kesintisi-yuzde" placeholder="10">
    </div>

    <div class="input-group">
        <label>Gelir Vergisi Oranı (%)</label>
        <select id="tax-rate">
            <option value="0.15">15%</option>
            <option value="0.20">20%</option>
            <option value="0.27">27%</option>
            <option value="0.35">35%</option>
        </select>
    </div>
