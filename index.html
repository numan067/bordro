<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Maaş Hesaplama</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6a1b9a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2654/2654522.png">

    <style>
        /* Önceki görsel stil kodların buraya gelecek (Mor Tema) */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #6a1b9a; border-bottom: 2px solid #6a1b9a; padding-bottom: 10px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        .input-group label { font-size: 11px; font-weight: bold; margin-bottom: 3px; }
        .input-group input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .net-maas-box { background: linear-gradient(135deg, #6a1b9a, #8e24aa); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 15px; }
        .net-maas-value { font-size: 32px; font-weight: bold; }
        .bottom-buttons { display: flex; gap: 5px; margin-top: 15px; }
        .bottom-buttons button { flex: 1; padding: 10px; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Maaş Hesaplama 2026</h2>
        <div class="top-options">
            <select id="month"><option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option><option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option><option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option><option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option></select>
            <select id="tax-rate"><option value="0.15">15%</option><option value="0.20">20%</option><option value="0.27">27%</option></select>
        </div>
        <div class="input-grid">
            <div class="input-group"><label>Saat Ücreti:</label><input type="number" id="saat-ucreti" step="0.01"></div>
            <div class="input-group"><label>Çalışma Saati:</label><input type="number" id="calisma-gun-saati"></div>
            <div class="input-group"><label>Fazla Mesai:</label><input type="number" id="fazla-mesai-saati" value="0"></div>
            <div class="input-group"><label>Vakıf (%):</label><input type="number" id="vakif-kesintisi-yuzde" value="0"></div>
            </div>
        <div class="net-maas-box">
            <div>Ödenecek Net Maaş</div>
            <div class="net-maas-value" id="net-maas">0,00</div>
        </div>
        <div class="bottom-buttons">
            <button onclick="location.href='tes.html'">Görüşler</button>
            <button onclick="location.href='sosyal.html'">Sosyal Yardımlar</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // PWA Kaydı - ERR_FAILED Hatasını engellemek için ./ kullanımı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log("Uygulama hazır."))
                    .catch(err => console.log("Hata:", err));
            });
        }
    </script>
</body>
</html>
