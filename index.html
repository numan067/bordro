<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bordro ve Enflasyon Takip</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* Enflasyon Kartı */
        .stats-card {
            background: var(--card);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .stats-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid #f1f5f9;
        }

        .data-row span:first-child { color: #64748b; font-size: 15px; }
        .data-row span:last-child { font-weight: 700; color: var(--primary); }

        /* Toplam Kutusu */
        .total-box {
            margin-top: 20px;
            background: #fffcf0;
            border: 2px dashed var(--accent);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { display: flex; flex-direction: column; }
        .total-label .main { color: #854d0e; font-weight: 800; font-size: 13px; letter-spacing: 0.5px; }
        .total-label .sub { color: #b45309; font-size: 11px; font-weight: 600; }
        .total-value { color: #854d0e; font-weight: 900; font-size: 22px; }

        /* Ana Menü Butonları */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .btn-blue { background: #2563eb; color: white; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2); }
        .btn-green { background: #10b981; color: white; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-purple { background: #8b5cf6; color: white; box-shadow: 0 4px 6px rgba(139, 92, 246, 0.2); }
        .btn-outline { border: 2px solid #64748b; color: #64748b; background: transparent; margin-top: 10px; }
        
        .footer { text-align: center; color: #94a3b8; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="stats-card">
        <div class="stats-header">
            <span style="font-size: 24px; margin-right: 12px;">📈</span>
            <h2>2026 Enflasyon Verileri</h2>
        </div>

        <div class="data-row"><span>Ocak 2026</span><span>%4,84</span></div>
        <div class="data-row"><span>Şubat 2026</span><span>%2,96</span></div>
        <div class="data-row"><span>Mart 2026</span><span>%1,94</span></div>
        <div class="data-row"><span>Nisan 2026</span><span>%4,18</span></div>

        <div class="total-box">
            <div class="total-label">
                <span class="main">4 AYLIK TOPLAM</span>
                <span class="sub">(BİLEŞİK ENFLASYON)</span>
            </div>
            <span class="total-value">%14,64</span>
        </div>
    </div>

    <div class="btn-group">
        <a href="maas.html" class="btn btn-blue">Maaş Hesaplama</a>
        <a href="sosyal.html" class="btn btn-green">Sosyal Haklar</a>
        <a href="fark.html" class="btn btn-purple">Fark Hesaplama</a>
        
        <a href="duyuru.html" class="btn btn-outline">Duyuru Panosu</a>
        <a href="tes.html" class="btn btn-outline">Görüş ve Öneriler</a>
    </div>

    <div class="footer">
        © 2026 Numan Özdemir - Bordro Sistemleri
    </div>

</div>

</body>
</html>
